# ─────────────────────────────────────────────────────────────────────────────
# LARU HP ステージング（テスト）環境 Blueprint
#
# 目的: ログイン＋決済を「実害ゼロ」で検証するためのテスト用サイト。
#   - Stripe は【テストキー】を使う（テストカード 4242... で課金されない）
#   - Supabase は本番と同じでOK（テスト登録ユーザーは後で削除）
#
# 使い方:
#   Render → New → Blueprint → このリポジトリ → Blueprint Path に render.staging.yaml
#   → 作成後、下の sync:false の値をダッシュボードで入力（Coworkに任せてもOK）
#
# ⚠️ 安全のため、本番顧客に影響する以下は【わざと入れない（空のまま）】:
#     RETENTION_SECRET / CRON_SECRET … 入れると本番DB相手に自動メールが飛ぶ
#     RESEND_API_KEY                 … 入れるとフォームテストで実メール送信
#     TWILIO_* / VAPID_*             … SMS/プッシュの誤送信防止
# ─────────────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: laruvisona-staging
    runtime: node
    repo: https://github.com/takumichatbot/laruvisona-corp-site
    branch: main
    rootDir: laruvisona-web
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: starter
    region: singapore
    autoDeploy: false          # 勝手に再デプロイさせない（テスト用なので手動で十分）
    envVars:
      - key: NODE_ENV
        value: production

      # ── Stripe（必ず【テスト】の値を入れる）──────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false            # sk_test_... （テストのシークレットキー）
      - key: STRIPE_PRICE_ID
        sync: false            # HP ¥999 のテストprice
      - key: STRIPE_LITE_PRICE_ID
        sync: false            # Lite ¥2,980 のテストprice
      - key: STRIPE_BUNDLE_BOT_PRICE_ID
        sync: false            # HP+Bot ¥4,980 のテストprice
      - key: STRIPE_BUNDLE_FULL_PRICE_ID
        sync: false            # HP+Bot+SEO ¥9,800 のテストprice
      - key: STRIPE_AGENCY_PRICE_ID
        sync: false            # Agency のテストprice（任意）
      - key: STRIPE_HP_ANNUAL_PRICE_ID
        sync: false            # 年払い（任意）
      - key: STRIPE_LITE_ANNUAL_PRICE_ID
        sync: false
      - key: STRIPE_BOT_ANNUAL_PRICE_ID
        sync: false
      - key: STRIPE_FULL_ANNUAL_PRICE_ID
        sync: false
      - key: STRIPE_AGENCY_ANNUAL_PRICE_ID
        sync: false
      - key: STRIPE_FIRST_MONTH_COUPON_ID
        sync: false            # テストモードで作った初月無料クーポン（任意）
      - key: STRIPE_WEBHOOK_SECRET
        sync: false            # テストのwebhook secret（任意・webhook検証する場合）

      # ── Supabase（ログイン検証用。本番と同じ値でOK）──────────────────────
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # ── 基本（本番からコピー）──────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: NEXT_PUBLIC_ADMIN_SECRET
        sync: false
      - key: NEXT_PUBLIC_ADMIN_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false

      # ── アプリURL（作成後、Renderが発行したURLを入れる）──────────────────
      - key: NEXT_PUBLIC_APP_URL
        sync: false            # 例: https://laruvisona-staging.onrender.com

      # ── 任意（AI機能も検証したいなら本番からコピー。不要なら空でOK）──────
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
